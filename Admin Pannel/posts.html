<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Posts - Kishan Sathi Admin Panel</title> <link rel="stylesheet" href="theme-black.css"> <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
    }

    /* Header */
    .header {
        background: #417690;
        color: white;
        padding: 18px 30px;
        font-size: 24px;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 1000;
    }

    .header-right {
        display: flex;
        gap: 20px;
        align-items: center;
        font-size: 14px;
    }

    .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: white;
        color: #417690;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
    }

    .logout-btn {
        padding: 8px 18px;
        background: rgba(255,255,255,0.2);
        border: 1px solid rgba(255,255,255,0.3);
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.3s ease;
    }

    .logout-btn:hover {
        background: rgba(255,255,255,0.3);
    }

    /* Sidebar */
    .sidebar {
        width: 260px;
        height: 100vh;
        background: white;
        position: fixed;
        top: 0;
        left: 0;
        padding-top: 75px;
        border-right: 1px solid #e0e0e0;
        box-shadow: 2px 0 8px rgba(0,0,0,0.05);
        overflow-y: auto;
    }

    .sidebar a {
        display: flex;
        align-items: center;
        padding: 16px 24px;
        color: #447e9b;
        text-decoration: none;
        font-size: 15px;
        transition: all 0.3s ease;
        border-left: 3px solid transparent;
        gap: 12px;
    }

    .sidebar a:hover {
        background: #f0f7fa;
        border-left-color: #447e9b;
        padding-left: 28px;
    }

    .sidebar a.active {
        background: #e8f4f8;
        border-left-color: #417690;
        color: #417690;
        font-weight: 600;
    }

    .sidebar-icon {
        width: 20px;
        height: 20px;
        display: inline-block;
    }

    /* Main content */
    .main {
        margin-left: 260px;
        margin-top: 75px;
        padding: 30px;
        min-height: calc(100vh - 75px);
    }

    .page-title {
        font-size: 28px;
        color: #2c3e50;
        margin-bottom: 10px;
        font-weight: 600;
    }

    .page-subtitle {
        color: #7f8c8d;
        margin-bottom: 30px;
        font-size: 15px;
    }

    /* Stats Cards */
    .stats-container {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        border-left: 4px solid #417690;
    }

    .stat-label {
        color: #7f8c8d;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    .stat-value {
        font-size: 28px;
        font-weight: bold;
        color: #2c3e50;
    }

    /* Filters */
    .filters {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        margin-bottom: 30px;
        display: flex;
        gap: 15px;
        flex-wrap: wrap;
        align-items: center;
    }

    .search-box {
        flex: 1;
        min-width: 250px;
        padding: 10px 15px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
    }

    .filter-select {
        padding: 10px 15px;
        border: 1px solid #e0e0e0;
        border-radius: 8px;
        font-size: 14px;
        background: white;
        cursor: pointer;
    }

    /* Posts Grid */
    .posts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 24px;
    }

    .post-card {
        background: white;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        overflow: hidden;
        transition: all 0.3s ease;
    }

    .post-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .post-header {
        padding: 16px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .author-avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #417690, #447e9b);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 16px;
    }

    .author-info {
        flex: 1;
    }

    .author-name {
        font-size: 15px;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 2px;
    }

    .author-role {
        font-size: 12px;
        color: #7f8c8d;
    }

    .post-time {
        font-size: 12px;
        color: #95a5a6;
    }

    .post-image-container {
        width: 100%;
        height: 250px;
        background: #f8f9fa;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
    }

    .post-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .no-image {
        font-size: 64px;
        opacity: 0.3;
    }

    .post-body {
        padding: 16px;
    }

    .post-content {
        color: #2c3e50;
        font-size: 14px;
        line-height: 1.6;
        margin-bottom: 16px;
        display: -webkit-box;
        line-clamp: 3;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
    }

    .post-meta {
        display: flex;
        gap: 20px;
        color: #7f8c8d;
        font-size: 13px;
        margin-bottom: 16px;
        padding-top: 12px;
        border-top: 1px solid #f0f0f0;
    }

    .meta-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .post-footer {
        display: flex;
        gap: 8px;
        padding-top: 12px;
        border-top: 1px solid #f0f0f0;
    }

    /* Buttons */
    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-sm {
        padding: 8px 16px;
        font-size: 13px;
    }

    .btn-primary {
        background: #417690;
        color: white;
    }

    .btn-primary:hover {
        background: #356380;
    }

    .btn-secondary {
        background: #f0f0f0;
        color: #417690;
    }

    .btn-secondary:hover {
        background: #e0e0e0;
    }

    .btn-danger {
        background: #dc3545;
        color: white;
    }

    .btn-danger:hover {
        background: #c82333;
    }

    .btn-full {
        width: 100%;
    }

    /* Badges */
    .badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .badge-farmer {
        background: #d4edda;
        color: #155724;
    }

    .badge-doctor {
        background: #cce5ff;
        color: #004085;
    }

    .badge-buyer {
        background: #fff3cd;
        color: #856404;
    }

    /* Modal */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 2000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        border-radius: 12px;
        width: 90%;
        max-width: 700px;
        max-height: 90vh;
        overflow-y: auto;
        position: relative;
    }

    .modal-header {
        padding: 24px;
        border-bottom: 1px solid #f0f0f0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        background: white;
        z-index: 10;
    }

    .modal-title {
        font-size: 20px;
        font-weight: 600;
        color: #2c3e50;
    }

    .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: none;
        background: #f0f0f0;
        cursor: pointer;
        font-size: 20px;
        color: #7f8c8d;
    }

    .modal-close:hover {
        background: #e0e0e0;
    }

    .modal-body {
        padding: 24px;
    }

    .detail-section {
        margin-bottom: 24px;
    }

    .detail-label {
        font-size: 13px;
        color: #7f8c8d;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }

    .detail-value {
        font-size: 15px;
        color: #2c3e50;
        line-height: 1.6;
    }

    .detail-image {
        width: 100%;
        border-radius: 8px;
        margin-top: 8px;
    }

    .modal-actions {
        padding: 20px 24px;
        border-top: 1px solid #f0f0f0;
        display: flex;
        gap: 12px;
        position: sticky;
        bottom: 0;
        background: white;
    }

    /* Loading */
    .loading {
        text-align: center;
        padding: 60px 20px;
        color: #7f8c8d;
    }

    .spinner {
        border: 3px solid #f0f0f0;
        border-top: 3px solid #417690;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
        margin: 0 auto 16px;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #7f8c8d;
    }

    .empty-icon {
        font-size: 64px;
        margin-bottom: 16px;
        opacity: 0.3;
    }

    /* Responsive */
    @media (max-width: 1024px) {
        .sidebar {
            transform: translateX(-100%);
        }

        .main {
            margin-left: 0;
        }
    }

    @media (max-width: 768px) {
        .sidebar {
            transform: translateX(-100%);
        }

        .main {
            margin-left: 0;
            padding: 20px 16px;
        }

        .header {
            padding: 12px 16px;
            font-size: 18px;
        }

        .posts-grid {
            grid-template-columns: 1fr;
        }

        .filters {
            flex-direction: column;
        }

        .search-box {
            width: 100%;
            min-width: unset;
        }

        .stats-container {
            grid-template-columns: repeat(2, 1fr);
        }

        .post-footer {
            flex-direction: column;
        }
    }

    @media (max-width: 480px) {
        .main {
            padding: 14px 10px;
            margin-top: 60px;
        }

        .header {
            padding: 10px 12px;
            font-size: 16px;
        }

        .stats-container {
            grid-template-columns: 1fr;
        }

        .post-image-container {
            height: 180px;
        }
    }
</style> </head> <body> <!-- Header --> <div class="header"> <div>Kishan Sathi Admin Panel</div> <div class="header-right"> <div class="user-info"> <div class="avatar">A</div> <span>Admin</span> </div> <button class="logout-btn" onclick="logout()">Logout</button> </div> </div> <!-- Sidebar --> <div class="sidebar"> <a href="index.html"> <span class="sidebar-icon"></span>
        Dashboard
    </a> <a href="manageuser.html"> <span class="sidebar-icon"></span>
        Manage Users
    </a> <a href="verifydoctor.html"> <span class="sidebar-icon"></span>

    <!-- Main content --> <div class="main"> <h1 class="page-title">Community Posts</h1> <p class="page-subtitle">Manage all posts shared by farmers and agricultural consultants</p> <!-- Stats --> <div class="stats-container"> <div class="stat-card"> <div class="stat-label">Total Posts</div> <div class="stat-value" id="totalPosts">0</div> </div> <div class="stat-card"> <div class="stat-label">Farmer Posts</div> <div class="stat-value" id="farmerPosts">0</div> </div> <div class="stat-card"> <div class="stat-label">Doctor Posts</div> <div class="stat-value" id="doctorPosts">0</div> </div> <div class="stat-card"> <div class="stat-label">This Month</div> <div class="stat-value" id="thisMonthPosts">0</div> </div> <div class="stat-card"> <div class="stat-label">Total Likes</div> <div class="stat-value" id="totalLikes">0</div> </div> </div> <!-- Filters --> <div class="filters"> <input type="text" class="search-box" placeholder=" Search posts by content or author..." id="searchInput" oninput="filterPosts()"> <select class="filter-select" id="roleFilter" onchange="filterPosts()"> <option value="">All Users</option> <option value="farmer">Farmers</option> <option value="doctor">Doctors</option> </select> <select class="filter-select" id="sortFilter" onchange="filterPosts()"> <option value="newest">Newest First</option> <option value="oldest">Oldest First</option> <option value="most-liked">Most Liked</option> <option value="most-commented">Most Commented</option> </select> </div> <!-- Posts Grid --> <div class="posts-grid" id="postsGrid"> <div class="loading"> <div class="spinner"></div> <div>Loading posts...</div> </div> </div> </div> <!-- Post Detail Modal --> <div class="modal" id="postModal"> <div class="modal-content"> <div class="modal-header"> <div class="modal-title">Post Details</div> <button class="modal-close" onclick="closeModal()">×</button> </div> <div class="modal-body" id="modalBody"> <!-- Post details will be loaded here --> </div> <div class="modal-actions"> <button class="btn btn-danger" onclick="deletePost()">Delete Post</button> <button class="btn btn-secondary" onclick="closeModal()">Close</button> </div> </div> </div> <script src="js/api.js"></script> <script>
    // Check authentication
    checkAuth();

    let allPosts = [];
    let currentPost = null;

    // Load posts from API
    async function loadPosts() {
        try {
            const response = await apiCall(API_CONFIG.ENDPOINTS.ADMIN.POSTS || '/api/posts/posts/');
            allPosts = response.results || response;
            displayPosts();
            updateStats();
        } catch (error) {
            console.error('Failed to load posts:', error);
            document.getElementById('postsGrid').innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;"> <div class="empty-icon"></div> <div style="font-size: 18px; font-weight: 600; color: #e74c3c; margin-bottom: 8px;">
                        Failed to load posts
                    </div> <div style="font-size: 14px;">${error.message}</div> </div>
            `;
        }
    }

    // Display posts
    function displayPosts() {
        const grid = document.getElementById('postsGrid');
        
        if (allPosts.length === 0) {
            grid.innerHTML = `
                <div class="empty-state" style="grid-column: 1/-1;"> <div class="empty-icon"></div> <div style="font-size: 18px; font-weight: 600; margin-bottom: 8px;">No posts yet</div> <div style="font-size: 14px;">Posts from farmers and doctors will appear here</div> </div>
            `;
            return;
        }

        grid.innerHTML = allPosts.map(post => {
            const author = post.author || {};
            const initials = getInitials(author.full_name || 'Unknown');
            const roleClass = `badge-${author.role || 'farmer'}`;
            const roleName = (author.role || 'farmer').charAt(0).toUpperCase() + (author.role || 'farmer').slice(1);
            const postDate = formatDate(post.created_at);
            const imageUrl = post.image ? (post.image.startsWith('http') ? post.image : `${API_CONFIG.BASE_URL}${post.image}`) : null;

            return `
                <div class="post-card"> <div class="post-header"> <div class="author-avatar">${initials}</div> <div class="author-info"> <div class="author-name">${author.full_name || 'Unknown User'}</div> <div class="author-role"> <span class="badge ${roleClass}">${roleName}</span> </div> </div> <div class="post-time">${postDate}</div> </div>
                    
                    ${imageUrl ? `
                        <div class="post-image-container"> <img src="${imageUrl}" alt="Post image" class="post-image" onerror="this.parentElement.innerHTML='<div class=\\'no-image\\'></div>'"> </div>
                    ` : `
                        <div class="post-image-container"> <div class="no-image"></div> </div>
                    `}
                    
                    <div class="post-body"> <div class="post-content">${post.content || 'No content'}</div> <div class="post-meta"> <div class="meta-item"> <span></span> <span>${post.likes_count || 0} Likes</span> </div> <div class="meta-item"> <span></span> <span>${post.comments_count || 0} Comments</span> </div> </div> <div class="post-footer"> <button class="btn btn-sm btn-secondary btn-full" onclick="viewPost(${post.id})">
                                View Full Post
                            </button> </div> </div> </div>
            `;
        }).join('');
    }

    // Filter posts
    function filterPosts() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const roleFilter = document.getElementById('roleFilter').value;
        const sortFilter = document.getElementById('sortFilter').value;

        let filtered = allPosts.filter(post => {
            const author = post.author || {};
            const matchesSearch = !searchTerm || 
                (post.content || '').toLowerCase().includes(searchTerm) ||
                (author.full_name || '').toLowerCase().includes(searchTerm);
            
            const matchesRole = !roleFilter || author.role === roleFilter;

            return matchesSearch && matchesRole;
        });

        // Sort
        filtered.sort((a, b) => {
            switch(sortFilter) {
                case 'oldest':
                    return new Date(a.created_at) - new Date(b.created_at);
                case 'most-liked':
                    return (b.likes_count || 0) - (a.likes_count || 0);
                case 'most-commented':
                    return (b.comments_count || 0) - (a.comments_count || 0);
                case 'newest':
                default:
                    return new Date(b.created_at) - new Date(a.created_at);
            }
        });

        allPosts = [...filtered];
        displayPosts();
    }

    // Update stats
    function updateStats() {
        const total = allPosts.length;
        const farmers = allPosts.filter(p => p.author?.role === 'farmer').length;
        const doctors = allPosts.filter(p => p.author?.role === 'doctor').length;
        const totalLikes = allPosts.reduce((sum, p) => sum + (p.likes_count || 0), 0);
        
        // Calculate posts from this month
        const now = new Date();
        const thisMonth = allPosts.filter(p => {
            const postDate = new Date(p.created_at);
            return postDate.getMonth() === now.getMonth() && 
                   postDate.getFullYear() === now.getFullYear();
        }).length;

        document.getElementById('totalPosts').textContent = total;
        document.getElementById('farmerPosts').textContent = farmers;
        document.getElementById('doctorPosts').textContent = doctors;
        document.getElementById('thisMonthPosts').textContent = thisMonth;
        document.getElementById('totalLikes').textContent = totalLikes;
    }

    // View post details
    async function viewPost(postId) {
        try {
            const post = allPosts.find(p => p.id === postId);
            if (!post) return;

            currentPost = post;
            const author = post.author || {};
            const initials = getInitials(author.full_name || 'Unknown');
            const roleClass = `badge-${author.role || 'farmer'}`;
            const roleName = (author.role || 'farmer').charAt(0).toUpperCase() + (author.role || 'farmer').slice(1);
            const postDate = formatDate(post.created_at);
            const imageUrl = post.image ? (post.image.startsWith('http') ? post.image : `${API_CONFIG.BASE_URL}${post.image}`) : null;

            document.getElementById('modalBody').innerHTML = `
                <div class="detail-section"> <div class="post-header" style="padding: 0; border: none; margin-bottom: 20px;"> <div class="author-avatar">${initials}</div> <div class="author-info"> <div class="author-name">${author.full_name || 'Unknown User'}</div> <div class="author-role"> <span class="badge ${roleClass}">${roleName}</span> <span style="margin-left: 8px; color: #95a5a6; font-size: 13px;">${author.email || 'No email'}</span> </div> </div> <div class="post-time">${postDate}</div> </div> </div>

                ${imageUrl ? `
                    <div class="detail-section"> <img src="${imageUrl}" alt="Post image" class="detail-image" onerror="this.style.display='none'"> </div>
                ` : ''}

                <div class="detail-section"> <div class="detail-label">Post Content</div> <div class="detail-value">${post.content || 'No content'}</div> </div> <div class="detail-section"> <div class="detail-label">Engagement</div> <div style="display: flex; gap: 24px; margin-top: 12px;"> <div style="display: flex; align-items: center; gap: 8px;"> <span style="font-size: 20px;"></span> <div> <div style="font-size: 20px; font-weight: 600; color: #2c3e50;">${post.likes_count || 0}</div> <div style="font-size: 12px; color: #7f8c8d;">Likes</div> </div> </div> <div style="display: flex; align-items: center; gap: 8px;"> <span style="font-size: 20px;"></span> <div> <div style="font-size: 20px; font-weight: 600; color: #2c3e50;">${post.comments_count || 0}</div> <div style="font-size: 12px; color: #7f8c8d;">Comments</div> </div> </div> </div> </div> <div class="detail-section"> <div class="detail-label">Post Information</div> <div style="display: grid; gap: 12px; margin-top: 12px;"> <div style="display: flex; justify-content: space-between;"> <span style="color: #7f8c8d;">Post ID:</span> <span style="color: #2c3e50; font-weight: 500;">#${post.id}</span> </div> <div style="display: flex; justify-content: space-between;"> <span style="color: #7f8c8d;">Author ID:</span> <span style="color: #2c3e50; font-weight: 500;">#${author.id || 'N/A'}</span> </div> <div style="display: flex; justify-content: space-between;"> <span style="color: #7f8c8d;">Created:</span> <span style="color: #2c3e50; font-weight: 500;">${formatDateTime(post.created_at)}</span> </div>
                        ${post.updated_at && post.updated_at !== post.created_at ? `
                        <div style="display: flex; justify-content: space-between;"> <span style="color: #7f8c8d;">Last Updated:</span> <span style="color: #2c3e50; font-weight: 500;">${formatDateTime(post.updated_at)}</span> </div>
                        ` : ''}
                    </div> </div>
            `;

            document.getElementById('postModal').classList.add('active');
        } catch (error) {
            console.error('Failed to load post details:', error);
            alert('Failed to load post details');
        }
    }

    // Delete post
    async function deletePost() {
        if (!currentPost) return;

        if (!confirm(`Are you sure you want to delete this post by ${currentPost.author?.full_name || 'Unknown'}?`)) {
            return;
        }

        try {
            await apiCall(`/api/posts/posts/${currentPost.id}/`, {
                method: 'DELETE'
            });

            alert('Post deleted successfully');
            closeModal();
            loadPosts(); // Reload posts
        } catch (error) {
            console.error('Failed to delete post:', error);
            alert('Failed to delete post: ' + error.message);
        }
    }

    // Close modal
    function closeModal() {
        document.getElementById('postModal').classList.remove('active');
        currentPost = null;
    }

    // Get initials from name
    function getInitials(name) {
        return name
            .split(' ')
            .map(n => n[0])
            .join('')
            .toUpperCase()
            .slice(0, 2);
    }

    // Format date and time
    function formatDateTime(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // Logout
    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            clearAuthData();
            window.location.href = 'login.html';
        }
    }

    // Close modal on background click
    document.getElementById('postModal').addEventListener('click', (e) => {
        if (e.target.id === 'postModal') {
            closeModal();
        }
    });

    // Initialize
    loadPosts();
</script> </body> </html>
