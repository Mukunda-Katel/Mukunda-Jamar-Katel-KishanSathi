<!DOCTYPE html> <html lang="en"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>Admin Login - Kishan Sathi</title> <link rel="stylesheet" href="theme-black.css"> <style>
    * {
        box-sizing: border-box;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-container {
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 420px;
    }

    .logo {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo h1 {
        color: #417690;
        font-size: 32px;
        margin: 0 0 10px 0;
    }

    .logo p {
        color: #7f8c8d;
        margin: 0;
        font-size: 16px;
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #2c3e50;
        font-weight: 600;
        font-size: 14px;
    }

    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 6px;
        font-size: 15px;
        transition: all 0.3s ease;
    }

    .form-group input:focus {
        outline: none;
        border-color: #417690;
    }

    .btn-login {
        width: 100%;
        padding: 14px;
        background: #417690;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-login:hover {
        background: #356072;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(65, 118, 144, 0.3);
    }

    .btn-login:disabled {
        background: #95a5a6;
        cursor: not-allowed;
        transform: none;
    }

    .error-message {
        background: #fee;
        color: #c00;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
        display: none;
    }

    .error-message.show {
        display: block;
    }

    /* Responsive */
    @media (max-width: 768px) {
        .login-container {
            margin: 20px;
            padding: 30px 24px;
        }
    }

    @media (max-width: 480px) {
        body {
            padding: 16px;
            align-items: flex-start;
            padding-top: 60px;
        }

        .login-container {
            padding: 24px 16px;
            margin: 0;
            border-radius: 10px;
        }

        .logo h1 {
            font-size: 24px;
        }

        .logo p {
            font-size: 14px;
        }

        .form-group input {
            padding: 10px 14px;
            font-size: 14px;
        }

        .btn-login {
            padding: 12px;
            font-size: 15px;
        }
    }
</style> </head> <body> <div class="login-container"> <div class="logo"> <h1> Kishan Sathi</h1> <p>Admin Panel Login</p> </div> <div id="errorMessage" class="error-message"></div> <form id="loginForm"> <div class="form-group"> <label for="email">Email Address</label> <input 
                type="email" 
                id="email" 
                name="email" 
                required 
                placeholder="admin@kishansathi.com"
            > </div> <div class="form-group"> <label for="password">Password</label> <input 
                type="password" 
                id="password" 
                name="password" 
                required 
                placeholder="Enter your password"
            > </div> <button type="submit" class="btn-login" id="loginBtn">
            Login
        </button> </form> </div> <script src="js/api.js"></script> <script>
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Hide any previous error
        errorMessage.classList.remove('show');
        
        // Disable button
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        try {
            const data = await apiCall(API_CONFIG.ENDPOINTS.AUTH.LOGIN, {
                method: 'POST',
                body: JSON.stringify({ email, password }),
            });

            // Check if user is admin
            if (data.user.role !== 'admin') {
                throw new Error('Access denied. Admin privileges required.');
            }

            // Save token and user data
            setAuthToken(data.token);
            localStorage.setItem(STORAGE_KEYS.USER_DATA, JSON.stringify(data.user));

            // Redirect to dashboard
            window.location.href = 'index.html';
        } catch (error) {
            errorMessage.textContent = error.message || 'Login failed. Please check your credentials.';
            errorMessage.classList.add('show');
            loginBtn.disabled = false;
            loginBtn.textContent = 'Login';
        }
    });

    // Redirect if already logged in
    if (isLoggedIn()) {
        window.location.href = 'index.html';
    }
</script> </body> </html>
